apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: my-app-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: my-app
    rules:
    - alert: AppDown
      expr: kube_deployment_status_replicas_available{deployment="my-app"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "App is down!"
        description: "my-app has 0 available replicas for more than 1 minute."
